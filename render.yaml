services:
  # Backend API Service
  - type: web
    name: westinghouse-pet-api
    runtime: node
    buildCommand: npm install
    startCommand: node api-server.cjs
    envVars:
      - key: API_PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: rule
      - key: DATABASE_URI
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: PAYLOAD_SECRET
        sync: false
      - key: CORS_ALLOWLIST
        value: https://6f73qfwje5asw.kimi.page
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: static
    name: westinghouse-pet-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://westinghouse-pet-api.onrender.com/api
